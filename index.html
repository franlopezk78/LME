<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Forzamos que no guarde cache de la estructura básica -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Los Mandaos de Evi</title>
    <link rel="manifest" href="manifest.json?v=4.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css?v=4.0">
</head>
<body>
    <div id="app" class="edit-mode">
        <header>
            <div class="header-top">
                <button class="reset-btn" onclick="appController.resetAll()" title="Nueva Lista">
                    <i data-lucide="refresh-cw"></i>
                </button>
                <div class="brand">
                    <h1>Los Mandaos de <span class="accent">Evi</span></h1>
                </div>
                <div class="actions">
                    <button class="share-btn edit-only" onclick="appController.shareWhatsApp()" title="Compartir">
                        <i data-lucide="share-2"></i>
                    </button>
                    <button id="mode-toggle" class="mode-btn" onclick="appController.toggleMode()">
                        <span class="edit-only"><i data-lucide="shopping-basket"></i></span>
                        <span class="shop-only"><i data-lucide="edit-3"></i></span>
                    </button>
                </div>
            </div>
            
            <div class="shop-header shop-only">
                <p id="shop-stats">0 comprados de 0</p>
                <button id="finish-btn" class="clear-checked hidden" onclick="appController.clearChecked()">SACABÓ <i data-lucide="check-circle"></i></button>
            </div>
        </header>

        <section id="catalog-area" class="catalog-area hidden edit-only"></section>

        <main id="list-container">
            <div id="empty-state" class="empty-state">
                <i data-lucide="package" class="empty-icon"></i>
                <p>Lista vacía. ¡Toca el micro o el carrito!</p>
            </div>
            <ul id="shopping-list" class="shopping-list"></ul>
        </main>

        <div id="voice-overlay" class="voice-overlay hidden">
            <div class="voice-card">
                <div class="pulse-ring"></div>
                <i data-lucide="mic" class="mic-icon-large"></i>
                <p id="transcript-preview"></p>
                <button onclick="voiceModule.stopListening()" class="close-overlay">Cancelar</button>
            </div>
        </div>

        <nav class="bottom-nav edit-only">
            <div class="input-container">
                <button class="catalog-btn-bottom" onclick="appController.toggleCatalog()" title="Catálogo">
                    <i data-lucide="shopping-cart"></i>
                </button>
                <div class="input-group">
                    <input type="text" id="manual-input" placeholder="¿Qué compramos hoy?">
                    <button onclick="appController.addManualItem()" class="add-btn"><i data-lucide="plus"></i></button>
                </div>
            </div>
            <button id="mic-trigger" class="mic-btn"><i data-lucide="mic"></i></button>
        </nav>
    </div>

    <div id="error-toast" class="toast hidden"></div>

    <script src="app.js?v=4.0"></script>
    <script>
        // Forzamos registro con nueva versión
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=4.0').then(reg => {
                reg.update(); // Obliga a buscar cambios inmediatamente
            });
        }
        lucide.createIcons();
    </script>
</body>
</html>
